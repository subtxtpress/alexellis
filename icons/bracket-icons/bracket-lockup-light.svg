<svg xmlns="http://www.w3.org/2000/svg" width="280" height="32" viewBox="0 0 280 32">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600');
  </style>
  <!-- Brackets: 400 weight, dusty terracotta -->
  <text x="0" y="24" font-family="'IBM Plex Mono', monospace" font-weight="400" font-size="28" fill="#C9897A" letter-spacing="0">[</text>
  <!-- SP: 600 weight, ink -->
  <text x="18" y="24" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="28" fill="#241620" letter-spacing="2">SP</text>
  <!-- Closing bracket -->
  <text x="56" y="24" font-family="'IBM Plex Mono', monospace" font-weight="400" font-size="28" fill="#C9897A">]</text>
  <!-- Lockup text -->
  <text x="82" y="21" font-family="'IBM Plex Mono', monospace" font-weight="400" font-size="11" fill="#241620" fill-opacity="0.28" letter-spacing="3.5">SUBTXT PRESS</text>
</svg>
