<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="80" ry="80" fill="#1e2024"/>
  
  <!-- Document -->
  <rect x="105" y="95" width="230" height="290" rx="16" ry="16" fill="#2d3040" stroke="#4a4e65" stroke-width="4"/>
  
  <!-- Document lines -->
  <rect x="150" y="155" width="140" height="8" rx="4" fill="#4070e0"/>
  <rect x="150" y="195" width="140" height="8" rx="4" fill="#5c6080"/>
  <rect x="150" y="235" width="140" height="8" rx="4" fill="#5c6080"/>
  <rect x="150" y="275" width="120" height="8" rx="4" fill="#5c6080"/>
  
  <!-- Magnifying glass - solid blue circle with cutout -->
  <!-- Handle first (behind the circle) -->
  <line x1="373" y1="373" x2="420" y2="420" stroke="#4070e0" stroke-width="22" stroke-linecap="round"/>
  <!-- Outer filled blue circle -->
  <circle cx="318" cy="318" r="76" fill="#4070e0"/>
  <!-- Inner cutout matching background color exactly -->
  <circle cx="318" cy="318" r="54" fill="#1e2024"/>
</svg>
